name: Continuous Integration Pipeline (Maven Build, Test, Package, Docker)
run-name: ${{ github.actor }}

on:
  push:
    branches:
      - master
      - main

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: 21
          cache: maven

      - name: Run tests (Unit Test & Integration Test)
        run: mvn test

      - name: Build with Maven
        uses: mvn package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}  # token tao tu Account Settings -> Personal Access Token tren DockerHub

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/backend-service:${{ github.sha }}

